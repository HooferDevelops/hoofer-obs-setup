<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
        }

        .frame {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            border-style: solid;
            border-color: transparent;

            /* Forces crisp pixels instead of blurry stretching */
            image-rendering: pixelated; 

            border-image-source: url('xp-frame.png');

            /* Updated Slices: Notice the Right slice is now large enough to protect the buttons */
            /* Top Right Bottom Left */
            border-image-slice: 65 110 35 200 fill; 

            /* The visual width matches the slices perfectly */
            border-image-width: 65px 110px 35px 200px;

            /* 'round' or 'repeat' is often better for retro UI than 'stretch', 
               as it prevents title bar gradients from warping */
            border-image-repeat: stretch;
        }

        .header-text {
            font-family: sans-serif;
            font-size: 13px;

            font-weight: bold;

            position: absolute;
            top: 10px;
            left: 26px;
            color: #fff;

            z-index: 10;
            text-shadow: 1px 1px 0px #0A1883;
        }
    </style>
</head>
<body>
    <span class="header-text">Current Application</span>

    <div class="frame"></div>
</body>
</html>
